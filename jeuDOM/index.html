<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - Jeu DOM</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <button class="bouton-retour" onclick="window.location.href='../index.html'">Retour</button>
    <div class="container">
        <header>
            <h1>2048</h1>
            <div class="score-container">
                <div class="score-box">
                    SCORE
                    <span id="score">0</span>
                </div>
                <div class="score-box">
                    RECORD
                    <span id="best-score">0</span>
                </div>
            </div>
        </header>

        <div class="game-intro">
            <p>Fusionnez les tuiles pour atteindre <strong>2048</strong> ! <br><small>Astuce: La tuile ⭐ (Joker) fusionne avec n'importe quel chiffre et le double !</small></p>
        </div>

        <div class="game-controls">
            <div class="control-group">
                <select id="game-mode" class="custom-select">
                    <option value="classic" selected>Mode Classique</option>
                    <option value="survival">Mode Survie</option>
                </select>
                <select id="grid-size" class="custom-select">
                    <option value="3">3x3 (Difficile)</option>
                    <option value="4" selected>4x4 (Classique)</option>
                    <option value="5">5x5 (Facile)</option>
                    <option value="6">6x6 (Bac à sable)</option>
                </select>
            </div>
            <div class="control-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="joker-toggle" checked>
                    ⭐ Joker
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="obstacle-toggle">
                    🧱 Obstacles
                </label>
            </div>
            <button id="new-game-btn">Nouvelle partie</button>
        </div>

        <div id="survival-timer-container" class="hidden">
            <div id="survival-timer-bar"></div>
        </div>

        <div class="game-container">
            <div id="grid-container">
            </div>
            <div id="tile-container">
            </div>
            <div id="game-over" class="hidden">
                <p>Game Over!</p>
                <button id="try-again-btn">Réessayer</button>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
