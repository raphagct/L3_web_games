<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - Game Book</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kufam:ital,wght@0,400..900;1,400..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="toogle" id="toogle">
        <div class="rectangle"></div>
        <div class="rectangle"></div>
        <div class="rectangle"></div>
    </div>

<div class="navbar">
    <img src="./assets/images/logo.png" alt="logo" class="logo">
    
    <ul class="navbar-list" id="navbar">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

    <ul class="navbar-login">
        <li class="librairy"><a href="library.html"><img src="assets/images/library.png" alt=""></a></li>
        <li class="login"><a href="login.html"><img src="assets/images/person.png" alt=""></a></li>
    </ul>
</div>

<div class="library-container">
    <h2>Ma Bibliothèque de Jeux</h2>
    <p class="login-prompt" id="library-login-prompt">Vous devez être connecté pour voir vos meilleurs scores.</p>
    
    <div class="games-grid">
        <!-- Game 1 -->
        <div class="game-card">
            <div class="game-placeholder">Jeu Canvas</div>
            <div class="game-info">
                <h3>Jeu Canvas</h3>
                <p>Score: <span class="score-value" id="score-canvas">Non joué</span></p>
                <button class="play-btn" onclick="window.location.href='./jeuCanvas/index.html'">Jouer</button>
            </div>
        </div>
        
        <!-- Game 2 -->
        <div class="game-card">
            <div class="game-placeholder">Jeu DOM</div>
            <div class="game-info">
                <h3>Jeu DOM</h3>
                <p>Score: <span class="score-value" id="score-dom">Non joué</span></p>
                <button class="play-btn" onclick="window.location.href='./jeuDOM/index.html'">Jouer</button>
            </div>
        </div>

        <!-- Game 3 -->
        <div class="game-card">
            <div class="game-placeholder">Jeu Babylon</div>
            <div class="game-info">
                <h3>Jeu Babylon</h3>
                <p>Score: <span class="score-value" id="score-babylon">Non joué</span></p>
                <button class="play-btn" onclick="window.location.href='./jeuBabylon/dist/index.html'">Jouer</button>
            </div>
        </div>
        
    </div>
</div>

<script src="./index.js"></script>
<script>    
    document.addEventListener("DOMContentLoaded", async () => {
        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
        const loginPrompt = document.getElementById('library-login-prompt');
        
        if (isLoggedIn) {
            loginPrompt.style.display = 'none';
            const userStr = localStorage.getItem('currentUser');
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    const response = await fetch(`http://localhost:5000/api/scores/user/${user.id}`);
                    if (response.ok) {
                        const scores = await response.json();
                        scores.forEach(s => {
                            const el = document.getElementById(`score-${s.gameName}`);
                            if (el) {
                                el.textContent = s.score + " pts";
                                el.style.color = "#ffd59d";
                                el.style.fontWeight = "bold";
                            }
                        });
                    }
                } catch(e) {
                    console.error("Erreur de récupération des scores", e);
                }
            }
        }
    });
</script>
</body>
<footer>

</html>
