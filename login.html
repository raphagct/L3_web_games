<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Game Book</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kufam:ital,wght@0,400..900;1,400..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="toogle" id="toogle">

        <div class="rectangle"></div>
        <div class="rectangle"></div>
        <div class="rectangle"></div>

    </div>

<div class="navbar">
    <img src="./assets/images/logo.png" alt="logo" class="logo">
    
    <ul class="navbar-list" id="navbar">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

    <ul class="navbar-login">
        <li class="librairy"><a href="library.html"><img src="assets/images/library.png" alt=""></a></li>
        <li class="login"><a href="login.html"><img src="assets/images/person.png" alt=""></a></li>
    </ul>
</div>

<div class="auth">
    <div class="form" id="login-form">
        <h2>Login</h2>
        <form id="form-login">
            <input type="email" id="login-email" placeholder="Email" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <span onclick="toggleAuth()">Register</span></p>
    </div>

    <div class="form hidden" id="register-form">
        <h2>Register</h2>
        <form id="form-register">
            <input type="text" id="register-username" placeholder="Username" required>
            <input type="email" id="register-email" placeholder="Email" required>
            <input type="password" id="register-password" placeholder="Password" required>
            <input type="password" id="register-confirm-password" placeholder="Confirm Password" required>
            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <span onclick="toggleAuth()">Login</span></p>
    </div>
</div>

<script>
    function toggleAuth() {
        document.getElementById('login-form').classList.toggle('hidden');
        document.getElementById('register-form').classList.toggle('hidden');
    }
</script>
<script src="./index.js"></script>
</body>
<footer>
    <p>© 2025 Game Book. All rights reserved.</p>
</footer>
</html>
